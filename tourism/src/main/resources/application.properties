spring.application.name=tourism
server.port=${PORT:8080}

# Fixed JWT secret (min 32 chars for HS256). Must stay the same across restarts.
jwt.secret=SmartTourismJwtSecretKeyAtLeast32CharactersLong

# Razorpay (get test keys from https://dashboard.razorpay.com/app/keys)
razorpay.key=rzp_test_demo123456
razorpay.secret=demo_secret123456

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.jpa.show-sql=true
spring.security.user.name=admin
spring.security.user.password=admin123
spring.jpa.hibernate.ddl-auto=update

# Hibernate dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Use Hibernate as JPA provider
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false